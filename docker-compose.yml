version: '3'
services:
  react-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - load-balancer

  express-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      replicas: 3

  load-balancer:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "3001:80"
    depends_on:
      - express-api
